name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: 代码风格检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci || npm install

      - name: 语法检查
        run: |
          echo "🔍 检查 JS 语法..."
          find cloudfunctions -name "*.js" -print0 | xargs -0 -I {} node --check {}
          find miniprogram -name "*.js" -print0 | xargs -0 -I {} node --check {}

      - name: JSON 校验
        run: |
          echo "🔍 检查 JSON 格式..."
          find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*" | while read f; do
            node -e "JSON.parse(require('fs').readFileSync('$f'))" || (echo "❌ $f" && exit 1)
          done

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci || npm install

      - name: 运行测试
        run: npm test -- --ci --coverage

      - name: 上传覆盖率
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  size-check:
    name: 代码体积检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 检查云函数大小
        run: |
          echo "📦 检查云函数体积(单个不超过 50MB)..."
          du -sh cloudfunctions/* | sort -h | tail -20

      - name: 统计代码量
        run: |
          echo "📊 代码量统计:"
          echo "JS 文件: $(find . -name '*.js' -not -path './node_modules/*' | wc -l)"
          echo "WXML: $(find miniprogram -name '*.wxml' | wc -l)"
          echo "WXSS: $(find miniprogram -name '*.wxss' | wc -l)"
          echo "云函数: $(ls cloudfunctions | grep -v common | wc -l)"

  build:
    name: 构建检查
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: 验证 app.json
        run: |
          node -e "
            const cfg = require('./miniprogram/app.json');
            if (!cfg.pages || cfg.pages.length === 0) {
              throw new Error('app.json 缺少 pages');
            }
            console.log('✅ app.json 有效,共 ' + cfg.pages.length + ' 个页面');
          "

      - name: 验证 project.config.json
        run: |
          node -e "
            const cfg = require('./miniprogram/project.config.json');
            if (!cfg.appid) throw new Error('缺少 appid');
            console.log('✅ project.config.json 有效');
          "
