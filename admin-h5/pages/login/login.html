<!DOCTYPE html>
<html lang="zh-CN" data-theme="sakura">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · 甜心蛋糕管理后台</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <style>
    body {
      background:
        radial-gradient(ellipse at top left, rgba(255, 123, 156, 0.15), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(255, 154, 110, 0.15), transparent 50%),
        var(--bg-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-primary);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-light);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-logo .icon {
      font-size: 56px;
      display: inline-block;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .login-logo h1 {
      font-size: 24px;
      margin-top: 8px;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-logo p {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 4px;
    }
    .login-card .form-group { margin-bottom: 16px; }
    .login-card .form-control {
      padding: 12px 14px;
      font-size: 15px;
    }
    .login-card .btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      margin-top: 8px;
    }
    .login-tips {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🎂</div>
      <h1>甜心蛋糕</h1>
      <p>商家管理后台</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">手机号</label>
        <input class="form-control" name="phone" placeholder="admin" value="admin" required />
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-control" name="password" type="password" placeholder="••••••" value="123456" required />
      </div>
      <button class="btn btn-primary btn-block" type="submit">登 录</button>
    </form>
    <div class="login-tips">
      默认账号: admin / 123456<br />
      主题切换在登录后右上角
    </div>
  </div>

  <script src="/js/request.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // 已登录直接跳
    if (http.getToken()) {
      location.href = '/pages/dashboard/dashboard.html';
    }
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const phone = fd.get('phone');
      const password = fd.get('password');
      try {
        const r = await http.post('/auth/login', { phone, password });
        http.setToken(r.data.token);
        // 存用户名
        if (r.data.employee) {
          localStorage.setItem('__admin_username__', r.data.employee.name || r.data.employee.phone);
        }
        App.toast.success('登录成功');
        setTimeout(() => location.href = '/pages/dashboard/dashboard.html', 300);
      } catch (err) {
        // toast 已在 request.js 处理
      }
    };
  </script>
</body>
</html>
