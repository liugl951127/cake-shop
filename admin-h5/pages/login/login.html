<!DOCTYPE html>
<html lang="zh-CN" data-theme="indigo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · 甜心蛋糕管理后台</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <style>
    body {
      background:
        radial-gradient(ellipse at top left, rgba(99, 102, 241, 0.18), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(129, 140, 248, 0.15), transparent 50%),
        var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-primary);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.12);
      border: 1px solid var(--border-light);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .icon {
      font-size: 64px;
      display: inline-block;
      animation: bounce 2s infinite;
      filter: drop-shadow(0 6px 16px rgba(99, 102, 241, 0.25));
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .login-logo h1 {
      font-size: 28px;
      font-weight: 700;
      margin-top: 12px;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-logo p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 8px;
    }
    .login-card .form-group { margin-bottom: 20px; }
    .login-card .form-control {
      padding: 14px 16px;
      font-size: 15px;
      border-radius: 12px;
    }
    .login-card .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      margin-top: 12px;
    }
    .login-tips {
      margin-top: 20px;
      padding: 14px;
      background: var(--primary-50);
      border-radius: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      border: 1px solid var(--primary-100);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🎂</div>
      <h1>甜心蛋糕</h1>
      <p>商家管理后台 v27</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">手机号 / 账号</label>
        <input class="form-control" name="phone" placeholder="admin" value="admin" required />
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-control" name="password" type="password" placeholder="••••••" value="123456" required />
      </div>
      <button class="btn btn-primary" type="submit">登 录</button>
    </form>
    <div class="login-tips">
      默认账号: admin / 123456<br />
      5 套主题: indigo(默认) / sakura / business / dark / white
    </div>
  </div>

  <script src="/js/request.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (http.getToken()) {
      location.href = '/pages/dashboard/dashboard.html';
    }
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const phone = fd.get('phone');
      const password = fd.get('password');
      try {
        const r = await http.post('/auth/login', { phone, password });
        http.setToken(r.data.token);
        if (r.data.employee) {
          localStorage.setItem('__admin_username__', r.data.employee.name || r.data.employee.phone);
        }
        App.toast.success('登录成功');
        setTimeout(() => location.href = '/pages/dashboard/dashboard.html', 300);
      } catch (err) {}
    };
  </script>
</body>
</html>
