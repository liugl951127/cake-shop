<!DOCTYPE html>
<html lang="zh-CN" data-theme="sakura">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>监控中心 · 甜心蛋糕管理后台</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/layout.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <div class="topbar"></div>
      <div class="content">
        <div class="page-header">
          <div>
            <div class="page-title">监控中心</div>
            <div class="page-subtitle">性能指标 + 异常上报</div>
          </div>
          <div class="page-actions">
            <button class="btn" onclick="loadAll()">🔄 刷新</button>
          </div>
        </div>

        <div class="card-grid" id="stats">
          <div class="stat-card">
            <div class="label">指标数据(24h)</div>
            <div class="value" id="mMetrics">-</div>
          </div>
          <div class="stat-card">
            <div class="label">异常(24h)</div>
            <div class="value" id="mErrors">-</div>
          </div>
          <div class="stat-card">
            <div class="label">严重异常</div>
            <div class="value" id="mCritical">-</div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(400px, 1fr));gap:20px;margin-top:20px">
          <div class="card">
            <div class="card-header">
              <div class="card-title">性能聚合</div>
            </div>
            <div class="card-body">
              <div id="perfAgg" class="loading-full">加载中...</div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">最近异常</div>
            </div>
            <div class="card-body">
              <div id="errorList" class="loading-full">加载中...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/request.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    AdminMenu.mountLayout({ active: 'monitor', breadcrumb: ['企业级', '监控中心'] });

    async function loadAll() {
      try {
        const r = await http.get('/monitor/dashboard');
        const d = r.data || {};
        document.getElementById('mMetrics').textContent = d.metricCount24h || 0;
        document.getElementById('mErrors').textContent = d.errorCount24h || 0;
        document.getElementById('mCritical').textContent = d.criticalErrors || 0;

        const agg = d.perfAggregate || [];
        document.getElementById('perfAgg').innerHTML = agg.length === 0
          ? '<div class="empty">暂无数据</div>'
          : `<table class="table">
              <thead><tr><th>指标</th><th>调用次数</th><th>平均</th><th>最大</th></tr></thead>
              <tbody>${agg.map(a => `
                <tr>
                  <td>${a.name}</td>
                  <td>${a.cnt}</td>
                  <td>${(a.avg || 0).toFixed(1)}</td>
                  <td>${(a.max || 0).toFixed(1)}</td>
                </tr>
              `).join('')}</tbody>
            </table>`;

        const errs = await http.get('/monitor/errors', { size: 20 });
        const errList = (errs.data && errs.data.records) || (errs.data && errs.data.list) || [];
        document.getElementById('errorList').innerHTML = errList.length === 0
          ? '<div class="empty">没有异常</div>'
          : errList.map(e => `
            <div style="padding:8px;border-bottom:1px solid var(--border-light)">
              <div>
                <span class="badge ${e.level === 'critical' ? 'badge-danger' : e.level === 'warn' ? 'badge-warning' : 'badge-info'}">${e.level}</span>
                <span class="badge">${e.scene}</span>
                <span style="color:var(--text-tertiary);font-size:12px;float:right">${App.formatTime(e.ts)}</span>
              </div>
              <div style="margin-top:4px;color:var(--text-primary)">${App.escape(e.message)}</div>
            </div>
          `).join('');
      } catch (e) {
        App.toast.error('加载失败');
      }
    }

    loadAll();
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
