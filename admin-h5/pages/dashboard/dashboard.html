<!DOCTYPE html>
<html lang="zh-CN" data-theme="indigo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>仪表盘 · 甜心蛋糕管理后台</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/layout.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <div class="topbar"></div>
      <div class="content">
        <div class="page-header">
          <div>
            <div class="page-title">仪表盘</div>
            <div class="page-subtitle">实时业务概览</div>
          </div>
          <div class="page-actions">
            <button class="btn" onclick="location.reload()">🔄 刷新</button>
            <button class="btn btn-primary" onclick="window.open('/pages/chat/console.html','_blank')">💬 客服台</button>
          </div>
        </div>

        <div class="card-grid" id="statCards"></div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(400px, 1fr));gap:20px;margin-top:20px">
          <div class="card">
            <div class="card-header">
              <div class="card-title">接口性能 (P50/P90/P99)</div>
            </div>
            <div class="card-body">
              <div id="perfStats" class="loading-full">加载中...</div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">7 天订单趋势</div>
            </div>
            <div class="card-body">
              <div id="orderChart" style="min-height:200px"></div>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(400px, 1fr));gap:20px;margin-top:20px">
          <div class="card">
            <div class="card-header">
              <div class="card-title">最近审计 / 活动</div>
            </div>
            <div class="card-body">
              <div id="recentActivity" class="loading-full">加载中...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/request.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/adminApi.js"></script>
  <script>
    AdminMenu.mountLayout({ active: 'dashboard', breadcrumb: ['概览', '仪表盘'] });

    async function loadStats() {
      try {
        const d = await adminApi.Dashboard.overview();
        renderDashboard(d);
        const perf = await adminApi.Monitor.perf().catch(() => ({}));
        renderPerf(perf);
      } catch (e) { /* toast 已在 adminApi 处理 */ }
    }

    function renderDashboard(d) {
      const t = d || {};
      const today = t.today || {};
      const total = t.total || {};
      const pending = t.pending || {};
      document.getElementById('statCards').innerHTML = `
        <div class="stat-card">
          <div class="label">今日营收</div>
          <div class="value">¥${Number(today.revenue || 0).toFixed(2)}</div>
          <div class="delta up">↑ ${today.orderCount || 0} 单</div>
        </div>
        <div class="stat-card">
          <div class="label">今日新会员</div>
          <div class="value">${today.newMembers || 0}</div>
          <div class="delta">人</div>
        </div>
        <div class="stat-card">
          <div class="label">商品总数</div>
          <div class="value">${total.goods || 0}</div>
          <div class="delta">件</div>
        </div>
        <div class="stat-card">
          <div class="label">会员总数</div>
          <div class="value">${total.members || 0}</div>
          <div class="delta">人</div>
        </div>
        <div class="stat-card">
          <div class="label">待处理订单</div>
          <div class="value">${pending.orders || 0}</div>
          <div class="delta warning">需处理</div>
        </div>
        <div class="stat-card">
          <div class="label">待接会话</div>
          <div class="value">${pending.tickets || 0}</div>
          <div class="delta warning">需接听</div>
        </div>
        <div class="stat-card">
          <div class="label">今日审计</div>
          <div class="value">${total.auditToday || 0}</div>
          <div class="delta">条</div>
        </div>
        <div class="stat-card">
          <div class="label">今日异常</div>
          <div class="value">${total.errorToday || 0}</div>
          <div class="delta ${(total.errorToday || 0) > 0 ? 'warning' : ''}">${(total.errorToday || 0) > 0 ? '需关注' : '正常'}</div>
        </div>
      `;

      // 7 天趋势
      const trend = t.trend7d || {};
      const max = Math.max(1, ...Object.values(trend).map(x => x.count || 0));
      const html = Object.entries(trend).map(([date, v]) => {
        const pct = (v.count || 0) / max * 100;
        return `
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="font-size:13px;color:var(--text-secondary)">${date}</span>
              <span><strong>${v.count || 0}</strong> 单 · ¥${Number(v.amount || 0).toFixed(2)}</span>
            </div>
            <div style="background:var(--bg-tertiary);border-radius:8px;height:10px;overflow:hidden">
              <div style="background:var(--primary-gradient);height:100%;width:${pct}%;border-radius:8px;transition:width 0.5s;box-shadow:var(--primary-shadow)"></div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('orderChart').innerHTML = html || '<div class="empty">暂无数据</div>';

      // 最近活动 - 用监控 API
      loadRecentActivity();
    }

    function renderPerf(p) {
      const el = document.getElementById('perfStats');
      if (!el) return;
      el.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
          <div><div style="font-size:24px;font-weight:700;color:var(--primary)">${p.p50 || 0}<span style="font-size:12px">ms</span></div><div style="font-size:12px;color:var(--text-tertiary)">P50</div></div>
          <div><div style="font-size:24px;font-weight:700;color:var(--primary)">${p.p90 || 0}<span style="font-size:12px">ms</span></div><div style="font-size:12px;color:var(--text-tertiary)">P90</div></div>
          <div><div style="font-size:24px;font-weight:700;color:var(--warning)">${p.p99 || 0}<span style="font-size:12px">ms</span></div><div style="font-size:12px;color:var(--text-tertiary)">P99</div></div>
          <div><div style="font-size:24px;font-weight:700;color:var(--text-primary)">${p.samples || 0}</div><div style="font-size:12px;color:var(--text-tertiary)">采样</div></div>
        </div>
      `;
    }

    async function loadRecentActivity() {
      try {
        const audit = await adminApi.Monitor.audit({ page: 1, size: 8 });
        const list = (audit && audit.list) || [];
        if (list.length === 0) {
          document.getElementById('recentActivity').innerHTML = '<div class="empty">暂无活动</div>';
          return;
        }
        document.getElementById('recentActivity').innerHTML = `
          <ul style="list-style:none;margin:0;padding:0">
            ${list.map(a => `
              <li style="padding:12rpx 0;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center">
                <div>
                  <span class="badge badge-primary">${a.action || '-'}</span>
                  <span style="margin-left:8px;font-size:13px">${a.adminName || a.adminId || 'system'}</span>
                </div>
                <span style="font-size:12px;color:var(--text-tertiary)">${App.formatTime(a.ts)}</span>
              </li>
            `).join('')}
          </ul>
        `;
      } catch (e) {
        document.getElementById('recentActivity').innerHTML = '<div class="empty">暂无活动</div>';
      }
    }

    loadStats();
  </script>
</body>
</html>
