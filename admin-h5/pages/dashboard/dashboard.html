<!DOCTYPE html>
<html lang="zh-CN" data-theme="sakura">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>仪表盘 · 甜心蛋糕管理后台</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/layout.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <div class="topbar"></div>
      <div class="content">
        <div class="page-header">
          <div>
            <div class="page-title">仪表盘</div>
            <div class="page-subtitle">实时业务概览</div>
          </div>
          <div class="page-actions">
            <button class="btn" onclick="location.reload()">🔄 刷新</button>
            <button class="btn btn-primary" onclick="window.open('/pages/chat/console.html','_blank')">💬 客服台</button>
          </div>
        </div>

        <div class="card-grid" id="statCards"></div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(400px, 1fr));gap:20px;margin-top:20px">
          <div class="card">
            <div class="card-header">
              <div class="card-title">订单状态分布</div>
            </div>
            <div class="card-body">
              <div id="orderChart" style="min-height:240px"></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">最近活动</div>
            </div>
            <div class="card-body">
              <div id="recentActivity" class="loading-full">加载中...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/request.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    AdminMenu.mountLayout({ active: 'dashboard', breadcrumb: ['概览', '仪表盘'] });

    async function loadStats() {
      try {
        const r = await http.get('/orders/dashboard');
        const d = r.data || {};
        document.getElementById('statCards').innerHTML = `
          <div class="stat-card">
            <div class="label">今日营收</div>
            <div class="value">${App.formatMoney(d.todayRevenue)}</div>
            <div class="delta up">↑ 实时统计</div>
          </div>
          <div class="stat-card">
            <div class="label">今日订单</div>
            <div class="value">${d.todayCount || 0}</div>
            <div class="delta">单</div>
          </div>
          <div class="stat-card">
            <div class="label">商品库存</div>
            <div class="value">${d.totalStock || 0}</div>
            <div class="delta">件</div>
          </div>
          <div class="stat-card">
            <div class="label">状态</div>
            <div class="value">🟢</div>
            <div class="delta">系统正常</div>
          </div>
        `;

        // 订单状态分布 - 用简单的横向条
        const dist = d.statusDistribution || [];
        if (dist.length) {
          const max = Math.max(...dist.map(x => x.cnt));
          const statusMap = { 0: '待付款', 1: '已付款', 2: '配送中', 3: '待收货', 4: '已完成', '-1': '已取消' };
          const html = dist.map(s => {
            const pct = max > 0 ? (s.cnt / max * 100) : 0;
            return `
              <div style="margin-bottom:12px">
                <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                  <span>${statusMap[s.status] || '状态' + s.status}</span>
                  <span style="color:var(--text-secondary)">${s.cnt} 单</span>
                </div>
                <div style="background:var(--bg-tertiary);border-radius:4px;height:8px;overflow:hidden">
                  <div style="background:var(--primary-gradient);height:100%;width:${pct}%;border-radius:4px;transition:width 0.4s"></div>
                </div>
              </div>
            `;
          }).join('');
          document.getElementById('orderChart').innerHTML = html;
        } else {
          document.getElementById('orderChart').innerHTML = '<div class="empty">暂无数据</div>';
        }

        // 最近活动 - 模拟
        document.getElementById('recentActivity').innerHTML = `
          <ul style="list-style:none">
            <li style="padding:8px 0;border-bottom:1px solid var(--border-light)">📦 新订单 <span class="badge badge-success">+1</span></li>
            <li style="padding:8px 0;border-bottom:1px solid var(--border-light)">💬 客服会话 <span class="badge badge-info">3 条新消息</span></li>
            <li style="padding:8px 0;border-bottom:1px solid var(--border-light)">🛡️ 风控审核 <span class="badge badge-warning">2 待审</span></li>
            <li style="padding:8px 0">👤 新注册 <span class="badge badge-primary">5</span></li>
          </ul>
        `;
      } catch (e) {
        document.getElementById('statCards').innerHTML = '<div class="empty">加载失败,请稍后重试</div>';
      }
    }
    loadStats();
  </script>
</body>
</html>
