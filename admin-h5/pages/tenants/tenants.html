<!DOCTYPE html>
<html lang="zh-CN" data-theme="sakura">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>租户管理 · 甜心蛋糕管理后台</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/layout.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <div class="topbar"></div>
      <div class="content">
        <div class="page-header">
          <div>
            <div class="page-title">租户管理</div>
            <div class="page-subtitle">多租户隔离,默认租户不可禁用</div>
          </div>
          <div class="page-actions">
            <button class="btn" onclick="loadData()">🔄 刷新</button>
            <button class="btn btn-primary" onclick="showCreate()">+ 新建租户</button>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="table-wrapper">
              <table class="table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Code</th>
                    <th>名称</th>
                    <th>套餐</th>
                    <th>状态</th>
                    <th>到期时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="result"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/request.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    AdminMenu.mountLayout({ active: 'tenants', breadcrumb: ['企业级', '租户管理'] });

    async function loadData() {
      try {
        const r = await http.get('/tenants');
        const list = r.data || [];
        if (list.length === 0) {
          document.getElementById('result').innerHTML = '<tr><td colspan="7"><div class="empty">无租户</div></td></tr>';
          return;
        }
        document.getElementById('result').innerHTML = list.map(t => {
          const isDefault = t.code === 'default';
          const statusClass = t.status === 'active' ? 'badge-success' : 'badge-danger';
          return `
            <tr>
              <td>${t.id}</td>
              <td><code>${App.escape(t.code)}</code> ${isDefault ? '<span class="badge badge-primary">默认</span>' : ''}</td>
              <td>${App.escape(t.name)}</td>
              <td><span class="badge">${t.plan || 'free'}</span></td>
              <td><span class="badge ${statusClass}">${t.status}</span></td>
              <td>${t.expireAt ? App.formatTime(t.expireAt) : '-'}</td>
              <td class="actions">
                ${isDefault ? '' : (t.status === 'active'
                  ? `<button class="danger" onclick="doAction(${t.id}, 'disable')">禁用</button>`
                  : `<button onclick="doAction(${t.id}, 'enable')">启用</button>`)}
                <button onclick="showEditQuota(${t.id}, '${App.escape(t.quota || '{}')}')">额度</button>
              </td>
            </tr>
          `;
        }).join('');
      } catch (e) {
        document.getElementById('result').innerHTML = '<tr><td colspan="7"><div class="empty">加载失败</div></td></tr>';
      }
    }

    async function doAction(id, action) {
      if (!await App.confirm('确认' + (action === 'disable' ? '禁用' : '启用') + '租户 #' + id + '?', '请确认')) return;
      try {
        await http.post('/tenants/' + id + '/' + action);
        App.toast.success('已操作');
        loadData();
      } catch (e) {}
    }

    function showCreate() {
      const body = `
        <div class="form-group">
          <label class="form-label">Code *</label>
          <input class="form-control" id="tCode" placeholder="唯一标识 (如 acme)" />
        </div>
        <div class="form-group">
          <label class="form-label">名称 *</label>
          <input class="form-control" id="tName" placeholder="租户名称" />
        </div>
        <div class="form-group">
          <label class="form-label">套餐</label>
          <select class="form-control" id="tPlan">
            <option value="free">Free</option>
            <option value="pro">Pro</option>
            <option value="enterprise" selected>Enterprise</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">到期时间</label>
          <input class="form-control" id="tExpire" type="date" />
        </div>
      `;
      const m = App.modal({
        title: '新建租户',
        body,
        footer: `<button class="btn" onclick="this.closest('.modal-mask').remove()">取消</button>
                 <button class="btn btn-primary" id="doCreateBtn">创建</button>`
      });
      m.el.querySelector('#doCreateBtn').onclick = async () => {
        const code = m.el.querySelector('#tCode').value.trim();
        const name = m.el.querySelector('#tName').value.trim();
        if (!code || !name) { App.toast.warning('Code/名称必填'); return; }
        const expireVal = m.el.querySelector('#tExpire').value;
        const body2 = { code, name, plan: m.el.querySelector('#tPlan').value };
        if (expireVal) body2.expireAt = new Date(expireVal).getTime();
        try {
          await http.post('/tenants', body2);
          App.toast.success('已创建');
          m.close();
          loadData();
        } catch (e) {}
      };
    }

    function showEditQuota(id, quotaStr) {
      let q;
      try { q = JSON.parse(quotaStr); } catch (e) { q = { users: 0, orders: 0, apiCallsPerDay: 0, storageGB: 0 }; }
      const body = `
        <p style="color:var(--text-secondary);font-size:13px">修改额度,JSON 格式</p>
        <div class="form-group">
          <label class="form-label">用户数上限</label>
          <input class="form-control" id="qUsers" type="number" value="${q.users || 0}" />
        </div>
        <div class="form-group">
          <label class="form-label">订单数上限</label>
          <input class="form-control" id="qOrders" type="number" value="${q.orders || 0}" />
        </div>
        <div class="form-group">
          <label class="form-label">日 API 调用上限</label>
          <input class="form-control" id="qApi" type="number" value="${q.apiCallsPerDay || 0}" />
        </div>
        <div class="form-group">
          <label class="form-label">存储(GB)</label>
          <input class="form-control" id="qStorage" type="number" value="${q.storageGB || 0}" />
        </div>
      `;
      const m = App.modal({
        title: '租户额度 #' + id,
        body,
        footer: `<button class="btn" onclick="this.closest('.modal-mask').remove()">取消</button>
                 <button class="btn btn-primary" id="doQuotaBtn">保存</button>`
      });
      m.el.querySelector('#doQuotaBtn').onclick = async () => {
        const quota = {
          users: Number(m.el.querySelector('#qUsers').value),
          orders: Number(m.el.querySelector('#qOrders').value),
          apiCallsPerDay: Number(m.el.querySelector('#qApi').value),
          storageGB: Number(m.el.querySelector('#qStorage').value)
        };
        try {
          await http.put('/tenants/' + id + '/quota', { quota });
          App.toast.success('已保存');
          m.close();
          loadData();
        } catch (e) {}
      };
    }

    loadData();
  </script>
</body>
</html>
