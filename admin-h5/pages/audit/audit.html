<!DOCTYPE html>
<html lang="zh-CN" data-theme="sakura">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>审计中心 · 甜心蛋糕管理后台</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <style>
    .audit-detail {
      max-height: 60vh;
      overflow-y: auto;
    }
    .diff-item {
      padding: 8px 12px;
      border-left: 3px solid var(--warning);
      background: var(--warning-light);
      margin-bottom: 4px;
      font-size: 12px;
    }
    .diff-item .key { font-weight: 600; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <div class="topbar"></div>
      <div class="content">
        <div class="page-header">
          <div>
            <div class="page-title">审计中心</div>
            <div class="page-subtitle">所有关键操作的留痕,支持回放</div>
          </div>
          <div class="page-actions">
            <button class="btn" onclick="loadData()">🔄 刷新</button>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <input class="form-control" id="fAction" placeholder="操作 (如 order.cancel)" style="width:200px" />
              <input class="form-control" id="fOperator" placeholder="操作人 ID" style="width:160px" />
              <select class="form-control" id="fSeverity" style="width:120px">
                <option value="">全部级别</option>
                <option value="info">Info</option>
                <option value="warn">Warn</option>
                <option value="critical">Critical</option>
              </select>
              <input class="form-control" id="fStart" type="date" style="width:140px" />
              <input class="form-control" id="fEnd" type="date" style="width:140px" />
              <button class="btn btn-primary" onclick="loadData()">🔍 查询</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">审计记录 <span class="badge" id="resultCount">0</span></div>
          </div>
          <div class="card-body">
            <div class="table-wrapper">
              <table class="table">
                <thead>
                  <tr>
                    <th>时间</th>
                    <th>操作</th>
                    <th>目标</th>
                    <th>操作人</th>
                    <th>级别</th>
                    <th>结果</th>
                    <th>耗时</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="result"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/request.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    // 给 AdminMenu 临时插入"审计"项
    AdminMenu.MENU.push({
      group: '企业级',
      items: [
        { id: 'audit', icon: '🔍', label: '审计中心', url: '/pages/audit/audit.html' },
        { id: 'monitor', icon: '📈', label: '监控中心', url: '/pages/monitor/monitor.html' },
        { id: 'tenants', icon: '🏢', label: '租户管理', url: '/pages/tenants/tenants.html' }
      ]
    });
    AdminMenu.mountLayout({ active: 'audit', breadcrumb: ['企业级', '审计中心'] });

    async function loadData() {
      const params = {
        page: 1, size: 50,
        action: document.getElementById('fAction').value || undefined,
        operatorId: document.getElementById('fOperator').value || undefined,
        severity: document.getElementById('fSeverity').value || undefined,
        startTs: document.getElementById('fStart').value ? new Date(document.getElementById('fStart').value).getTime() : undefined,
        endTs: document.getElementById('fEnd').value ? new Date(document.getElementById('fEnd').value).getTime() + 86400000 : undefined
      };
      try {
        const r = await http.get('/audit', params);
        const list = (r.data && r.data.records) || (r.data && r.data.list) || [];
        const total = r.data && r.data.total || 0;
        document.getElementById('resultCount').textContent = total + ' 条';
        if (list.length === 0) {
          document.getElementById('result').innerHTML = '<tr><td colspan="8"><div class="empty">未找到审计记录</div></td></tr>';
          return;
        }
        document.getElementById('result').innerHTML = list.map(a => {
          const sev = a.severity || 'info';
          const sevClass = { info: 'badge-info', warn: 'badge-warning', critical: 'badge-danger' }[sev] || 'badge';
          const resultClass = a.result === 'success' ? 'badge-success' : 'badge-danger';
          const detail = a.detail ? (typeof a.detail === 'string' ? JSON.parse(a.detail) : a.detail) : {};
          const duration = detail.durationMs ? detail.durationMs + 'ms' : '-';
          return `
            <tr>
              <td>${App.formatTime(a.ts || a.createTime)}</td>
              <td><code>${a.action}</code></td>
              <td>${a.targetType}/<span class="badge">${a.targetId}</span></td>
              <td>${App.escape(a.operatorName || a.operatorId)}</td>
              <td><span class="badge ${sevClass}">${sev}</span></td>
              <td><span class="badge ${resultClass}">${a.result}</span></td>
              <td>${duration}</td>
              <td>
                <button class="btn btn-sm" onclick="replay(${a.id})">回放</button>
              </td>
            </tr>
          `;
        }).join('');
      } catch (e) {
        document.getElementById('result').innerHTML = '<tr><td colspan="8"><div class="empty">查询失败</div></td></tr>';
      }
    }

    async function replay(id) {
      try {
        const r = await http.get('/audit/' + id + '/replay');
        const a = r.data.audit;
        const changes = diffObjects(a.beforeState, a.afterState);
        const body = `
          <p><strong>操作:</strong> <code>${a.action}</code> &nbsp;
             <strong>目标:</strong> ${a.targetType}/${a.targetId} &nbsp;
             <strong>结果:</strong> ${a.result}</p>
          <h4>变更字段 (${changes.length})</h4>
          <div class="audit-detail">
            ${changes.length === 0 ? '<p>无变更</p>' : changes.map(c => `
              <div class="diff-item">
                <div class="key">${c.key}</div>
                <div>before: <code>${App.escape(JSON.stringify(c.before))}</code></div>
                <div>after: <code>${App.escape(JSON.stringify(c.after))}</code></div>
              </div>
            `).join('')}
          </div>
        `;
        App.modal({ title: '操作回放 #' + id, body, size: 'lg' });
      } catch (e) {
        App.toast.error('回放失败');
      }
    }

    function diffObjects(before, after) {
      const changes = [];
      const b = typeof before === 'string' ? safeParse(before) : (before || {});
      const a = typeof after === 'string' ? safeParse(after) : (after || {});
      const keys = new Set([...Object.keys(b), ...Object.keys(a)]);
      for (const k of keys) {
        if (JSON.stringify(b[k]) !== JSON.stringify(a[k])) {
          changes.push({ key: k, before: b[k], after: a[k] });
        }
      }
      return changes;
    }
    function safeParse(s) { try { return JSON.parse(s); } catch (e) { return {}; } }

    loadData();
  </script>
</body>
</html>
