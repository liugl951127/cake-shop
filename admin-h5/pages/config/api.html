<!DOCTYPE html>
<html lang="zh-CN" data-theme="sakura">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接口配置 · 甜心蛋糕管理后台</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <style>
    .api-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
    }
    .api-card .head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .api-card .name { font-weight: 600; font-size: 15px; }
    .api-card .url {
      font-family: monospace; font-size: 12px; color: var(--text-secondary);
      background: var(--bg-tertiary); padding: 4px 8px; border-radius: 4px;
      display: inline-block; margin-top: 4px;
    }
    .api-card .meta { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <div class="topbar"></div>
      <div class="content">
        <div class="page-header">
          <div>
            <div class="page-title">接口配置</div>
            <div class="page-subtitle">统一管理第三方 API、支付、地图、短信等</div>
          </div>
          <div class="page-actions">
            <button class="btn" onclick="loadConfig()">🔄 刷新</button>
            <button class="btn btn-primary" onclick="saveAll()">💾 全部保存</button>
          </div>
        </div>

        <div class="tabs">
          <div class="tab active" data-tab="wechat">微信支付</div>
          <div class="tab" data-tab="sms">短信</div>
          <div class="tab" data-tab="map">地图</div>
          <div class="tab" data-tab="llm">AI 大模型</div>
          <div class="tab" data-tab="storage">云存储</div>
          <div class="tab" data-tab="risk">风控数据</div>
          <div class="tab" data-tab="business">业务参数</div>
        </div>

        <div id="apiList"></div>
      </div>
    </div>
  </div>

  <script src="/js/request.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    AdminMenu.mountLayout({ active: 'api-config', breadcrumb: ['运营', '接口配置'] });

    // API 分组 + 字段定义
    const GROUPS = {
      wechat: {
        title: '微信支付',
        items: [
          { key: 'wxPayAppId', label: 'AppID', type: 'text' },
          { key: 'wxPayMchId', label: '商户号', type: 'text' },
          { key: 'wxPayApiKey', label: 'API Key', type: 'password' },
          { key: 'wxPayCertPath', label: '证书路径', type: 'text' },
          { key: 'wxPayNotifyUrl', label: '回调地址', type: 'text' }
        ]
      },
      sms: {
        title: '短信服务',
        items: [
          { key: 'smsProvider', label: '服务商 (aliyun/tencent)', type: 'select', options: ['aliyun', 'tencent'] },
          { key: 'smsAccessKey', label: 'AccessKey', type: 'text' },
          { key: 'smsSecretKey', label: 'SecretKey', type: 'password' },
          { key: 'smsSignName', label: '签名', type: 'text' },
          { key: 'smsTemplateCode', label: '模板 Code', type: 'text' }
        ]
      },
      map: {
        title: '地图服务',
        items: [
          { key: 'mapProvider', label: '服务商 (tencent/amap)', type: 'select', options: ['tencent', 'amap', 'baidu'] },
          { key: 'mapKey', label: 'API Key', type: 'text' }
        ]
      },
      llm: {
        title: 'AI 大模型',
        items: [
          { key: 'llmProvider', label: '服务商 (openai/qwen/deepseek)', type: 'select', options: ['openai', 'qwen', 'deepseek', 'zhipu', 'mock'] },
          { key: 'llmApiKey', label: 'API Key', type: 'password' },
          { key: 'llmBaseUrl', label: 'Base URL', type: 'text' },
          { key: 'llmModel', label: '模型', type: 'text' }
        ]
      },
      storage: {
        title: '云存储',
        items: [
          { key: 'storageProvider', label: '服务商 (tencentcos/alioss/minio)', type: 'select', options: ['tencentcos', 'alioss', 'minio'] },
          { key: 'storageBucket', label: 'Bucket', type: 'text' },
          { key: 'storageRegion', label: 'Region', type: 'text' },
          { key: 'storageAccessKey', label: 'AccessKey', type: 'text' },
          { key: 'storageSecretKey', label: 'SecretKey', type: 'password' }
        ]
      },
      risk: {
        title: '风控数据',
        items: [
          { key: 'riskPhoneApiUrl', label: '手机号核验 URL', type: 'text' },
          { key: 'riskPhoneApiKey', label: '手机号核验 Key', type: 'password' },
          { key: 'riskIdcardApiUrl', label: '身份证核验 URL', type: 'text' },
          { key: 'riskIdcardApiKey', label: '身份证核验 Key', type: 'password' },
          { key: 'riskBankApiUrl', label: '银行卡四要素 URL', type: 'text' },
          { key: 'riskBankApiKey', label: '银行卡 Key', type: 'password' }
        ]
      },
      business: {
        title: '业务参数',
        items: [
          { key: 'commissionRate', label: '平台佣金率 (0-1)', type: 'number' },
          { key: 'minWithdraw', label: '最低提现(元)', type: 'number' },
          { key: 'maxWithdraw', label: '单次最高提现(元)', type: 'number' },
          { key: 'orderExpireMinutes', label: '订单过期时间(分)', type: 'number' },
          { key: 'autoConfirmDays', label: '自动确认收货(天)', type: 'number' },
          { key: 'payRiskThreshold', label: '风控阈值(分)', type: 'number' }
        ]
      }
    };

    let config = {};
    let activeGroup = 'wechat';

    document.querySelectorAll('.tab').forEach(t => {
      t.onclick = () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        activeGroup = t.dataset.tab;
        render();
      };
    });

    function render() {
      const g = GROUPS[activeGroup];
      const html = g.items.map(it => {
        const v = config[it.key] || '';
        let input = '';
        if (it.type === 'select') {
          input = `<select class="form-control" data-key="${it.key}">
            ${it.options.map(o => `<option value="${o}" ${o === v ? 'selected' : ''}>${o}</option>`).join('')}
          </select>`;
        } else if (it.type === 'textarea') {
          input = `<textarea class="form-control" data-key="${it.key}">${App.escape(v)}</textarea>`;
        } else {
          input = `<input class="form-control" type="${it.type === 'password' ? 'password' : 'text'}" data-key="${it.key}" value="${App.escape(v)}" />`;
        }
        return `<div class="form-group">
          <label class="form-label">${it.label} <span class="badge">${it.key}</span></label>
          ${input}
        </div>`;
      }).join('');
      document.getElementById('apiList').innerHTML = `<div class="card"><div class="card-header"><div class="card-title">${g.title}</div></div><div class="card-body">${html}</div></div>`;
    }

    async function loadConfig() {
      try {
        const r = await http.post('/api-config/get', { group: activeGroup });
        if (r.data) config = r.data;
      } catch (e) {
        const local = localStorage.getItem('__api_config__');
        if (local) config = JSON.parse(local);
      }
      render();
    }

    async function saveAll() {
      // 收集所有可见字段
      document.querySelectorAll('[data-key]').forEach(el => {
        config[el.dataset.key] = el.value;
      });
      try {
        await http.post('/api-config/save', config);
        App.toast.success('已保存到云端');
      } catch (e) {
        localStorage.setItem('__api_config__', JSON.stringify(config));
        App.toast.warning('已保存到本地(后端未通)');
      }
    }

    loadConfig();
  </script>
</body>
</html>
