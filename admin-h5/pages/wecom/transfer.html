<!DOCTYPE html>
<html lang="zh-CN" data-theme="sakura">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>转接记录 · 甜心蛋糕管理后台</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/layout.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <div class="topbar"></div>
      <div class="content">
        <div class="page-header">
          <div>
            <div class="page-title">转接记录</div>
            <div class="page-subtitle">客户转人工 + 跨平台(云函数/企业微信/电话)</div>
          </div>
          <div class="page-actions">
            <button class="btn" onclick="loadData()">🔄 刷新</button>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="table-wrapper">
              <table class="table">
                <thead>
                  <tr>
                    <th>时间</th>
                    <th>会话</th>
                    <th>用户</th>
                    <th>目标类型</th>
                    <th>目标账号</th>
                    <th>原因</th>
                    <th>结果</th>
                  </tr>
                </thead>
                <tbody id="result">
                  <tr><td colspan="7"><div class="loading-full">加载中...</div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/request.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    AdminMenu.mountLayout({ active: 'transfer-log', breadcrumb: ['客服', '转接记录'] });

    async function loadData() {
      try {
        const r = await http.post('/transfer/log', { size: 100 });
        const list = (r.data && r.data.list) || [];
        if (list.length === 0) {
          document.getElementById('result').innerHTML = '<tr><td colspan="7"><div class="empty">暂无转接记录</div></td></tr>';
          return;
        }
        document.getElementById('result').innerHTML = list.map(t => {
          const typeMap = { weCom: '企业微信', agent: '云客服', phone: '电话', group: '技能组' };
          const resultMap = { pending: 'badge-info', success: 'badge-success', fail: 'badge-danger' };
          return `
            <tr>
              <td>${App.formatTime(t.ts)}</td>
              <td><code>${App.escape((t.sessionId || '').slice(-12))}</code></td>
              <td>${App.escape(t.userId || t.openid || '-')}</td>
              <td><span class="badge badge-primary">${typeMap[t.toTarget] || t.toTarget || '-'}</span></td>
              <td><code>${App.escape(t.toTargetId || '-')}</code></td>
              <td>${App.escape(t.reason || '-')}</td>
              <td><span class="badge ${resultMap[t.result] || 'badge'}">${t.result || '-'}</span></td>
            </tr>
          `;
        }).join('');
      } catch (e) {
        document.getElementById('result').innerHTML = '<tr><td colspan="7"><div class="empty">加载失败</div></td></tr>';
      }
    }

    loadData();
  </script>
</body>
</html>
