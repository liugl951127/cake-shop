# ============================================
# 甜心蛋糕 - Spring Boot 配置
# ============================================
server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    max-threads: 200
    max-connections: 2000

spring:
  application:
    name: cakeshop-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: NON_NULL

  # 文件上传
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # 业务日志
  output:
    ansi:
      enabled: always

  # ============================================
  # Redis (Spring Boot 2.7 标准命名 spring.data.redis.*)
  # 兼容旧 spring.redis.* 命名(自动迁移)
  # ============================================
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      # 密码支持 - 空 = 无密码
      # 生产务必用环境变量注入,不要写死
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms
      # Lettuce 连接池
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 2
          max-wait: 2000ms
        shutdown-timeout: 200ms
      # Sentinel 集群(可选)
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:}
        nodes: ${REDIS_SENTINEL_NODES:}

# ============================================
# 自定义配置
# ============================================
cakeshop:
  # 业务配置
  business:
    commission-rate: 0.05          # 平台佣金 5%
    min-withdraw: 100              # 最低提现
    max-withdraw: 50000            # 单次最高提现
    order-expire-minutes: 30       # 订单过期(分)
    auto-confirm-days: 7           # 自动确认收货(天)

  # 鉴权
  security:
    jwt-secret: ${JWT_SECRET:cake-shop-jwt-secret-2024-change-me}
    jwt-ttl: 604800000             # 7 天
    jwt-header: Authorization
    jwt-prefix: "Bearer "
    ignore-urls:
      - /auth/login
      - /auth/refresh
      # 后台管理登录(API v1)
      - /api/v1/auth/login
      - /api/v1/auth/logout
      # 微信小程序直连(不走 JWT)
      - /api/wx/session
      - /api/wx/session/**
      - /doc.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /v2/api-docs/**
      - /webjars/**
      # 后台 H5 静态资源
      - /
      - /index.html
      - /pages/**

  # RBAC 角色权限
  rbac:
    super-admin: ["*"]
    admin: ["order:*", "goods:*", "user:*", "marketing:*", "finance:read", "agent:*"]
    operator: ["goods:write", "order:read", "marketing:write", "user:read"]
    finance: ["finance:*", "order:read"]
    customer-service: ["agent:read", "agent:write", "user:read", "order:read"]
    readonly: ["*:read"]

  # 微信云函数 HTTP 触发器 (可选, 不用时可不填)
  wechat:
    cloudbase:
      env-id: ${TCB_ENV_ID:cake-shop-prod-xxxx}
      api-base: https://${TCB_ENV_ID:cake-shop-prod-xxxx}.ap-shanghai.tcb-api.tencentcloud.com
      timeout-ms: 8000
    # 小程序 AppID / AppSecret (走 /api/wx/session 换 openid)
    appid: ${WX_APPID:}
    secret: ${WX_SECRET:}

  # ============================================
  # 鉴权 - 3 层防御
  # ============================================
  mp-auth:
    # 1. 小程序 openid + X-Login-Token 鉴权
    enabled: ${MP_AUTH_ENABLED:true}
    token-ttl: ${MP_TOKEN_TTL:86400}

  mp-referer:
    # 2. Referer 头校验(防外网直接调)
    enabled: ${MP_REFERER_ENABLED:false}
    appid: ${WX_APPID:}

  # ============================================
  # 内部 RPC Token (云函数 / 跨服务调用)
  # ============================================
  internal-rpc:
    enabled: ${INTERNAL_RPC_ENABLED:true}
    path-prefix: /api/internal/
    # 必须 32+ 位随机串, 生产用环境变量注入
    token: ${INTERNAL_RPC_TOKEN:dev-internal-rpc-token-change-me-32-chars-min}

  # ============================================
  # 缓存层(REDIS / LOCAL)
  # 密码配置已在上方 spring.data.redis.password
  # ============================================
  cache:
    # LOCAL  = 进程内 Caffeine (开发/测试)
    # REDIS  = 远程 Redis (生产)
    type: ${CACHE_TYPE:LOCAL}
    local:
      max-size: 10000
      default-ttl-minutes: 10

# ============================================
# MyBatis-Plus
# ============================================
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cakeshop.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    mapper-locations: classpath*:mapper/**/*.xml

# ============================================
# 日志
# ============================================
logging:
  level:
    root: INFO
    com.cakeshop: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ============================================
# SpringDoc / Knife4j
# ============================================
knife4j:
  enable: true
  setting:
    language: zh_cn
