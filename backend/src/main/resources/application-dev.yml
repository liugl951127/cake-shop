# 开发环境配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/cake_shop?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&useUnicode=true
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  redis:
    host: 127.0.0.1
    port: 6379
    # 不设 password 字段(空密码 Spring 会发 AUTH "" 命令导致报错)
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 8
        min-idle: 0

# 业务配置:Redis 可选,不可用时降级到 LocalCache
cakeshop:
  redis:
    # true: 连接 Redis(默认)
    # false: 跳过 Redisson,使用 LocalCache
    enabled: true
