# ============================================
# 开发环境 - LOCAL 缓存 (Caffeine 进程内)
# 无需 Redis,启动即用
# ============================================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/cake_shop?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&useUnicode=true
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # dev 不连 Redis
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.redisson.spring.starter.RedissonAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# 业务配置
cakeshop:
  # 缓存:开发走 LOCAL (Caffeine),无需 Redis
  cache:
    type: LOCAL
    local:
      max-size: 5000
      default-ttl-minutes: 5

  # 微信小程序 AppID / AppSecret (开发可空)
  wechat:
    appid: ${WX_APPID:dev}
    secret: ${WX_SECRET:dev}

  # 开发期: 鉴权仍开, referer 关
  mp-auth:
    enabled: true
    token-ttl: 86400

  mp-referer:
    enabled: false  # 微信开发者工具的 referer 与真机不同,开发期关
    appid: ${WX_APPID:}

  # 内部 RPC
  internal-rpc:
    enabled: true
    path-prefix: /api/internal/
    token: ${INTERNAL_RPC_TOKEN:dev-internal-rpc-token-change-me-32-chars-min}
