# ============================================
# 生产环境 - REDIS 缓存
# 密码通过 REDIS_PASSWORD 环境变量注入
# ============================================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:rm-xxxx.mysql.rds.aliyuncs.com}:${MYSQL_PORT:3306}/${MYSQL_DB:cake_shop}?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${MYSQL_USER:cake_shop}
    password: ${MYSQL_PASSWORD}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 30000

  # ===== Redis 生产配置 =====
  data:
    redis:
      host: ${REDIS_HOST:r-xxxx.redis.rds.aliyuncs.com}
      port: ${REDIS_PORT:6379}
      # 密码 - 必填,空字符串 = 无密码
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 30
          min-idle: 10
          max-wait: 3000ms
      # Sentinel 集群(可选)
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:}
        nodes: ${REDIS_SENTINEL_NODES:}

# 业务配置
cakeshop:
  # 缓存:生产走 REDIS
  cache:
    type: REDIS
    local:  # 不会用,占位
      max-size: 10000
      default-ttl-minutes: 10
