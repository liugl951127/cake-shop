# ============================================
# 测试环境 - H2 + LOCAL 缓存
# ============================================
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:cake_test;MODE=MySQL;DB_CLOSE_DELAY=0;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 0
      min-idle: 0
      max-active: 1
      test-while-idle: false
      test-on-borrow: false
      test-on-return: false
      validation-query: "SELECT 1"

  # 让 Spring 跑 test-h2-schema.sql 建表
  sql:
    init:
      mode: always
      schema-locations: classpath:db/test-h2-schema.sql
      continue-on-error: true

  main:
    allow-bean-definition-overriding: true

  # 禁用 Redis / Redisson 自动配置(测试环境不依赖)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.redisson.spring.starter.RedissonAutoConfiguration

cakeshop:
  cache:
    type: LOCAL
    local:
      max-size: 1000
      default-ttl-minutes: 1
  security:
    ignore-urls:
      - /api/v1/auth/login
      - /api/v1/auth/logout
      - /api/wx/session/**
      - /actuator/**
      - /v3/api-docs/**
      - /doc.html

logging:
  level:
    com.cakeshop: DEBUG
    com.cakeshop.controller.AuthController: TRACE
